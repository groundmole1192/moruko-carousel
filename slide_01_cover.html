<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  background:#222;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}
body {
  width:1080px; height:1080px;
  font-family:'Noto Sans JP',sans-serif;
  background:#FFF8F0;
  overflow:hidden; position:relative;
  transform-origin:center center; flex-shrink:0;
}

/* 背景装飾 */
.deco { position:absolute; border-radius:50%; }
.deco.d1 { width:600px; height:600px; background:rgba(247,147,30,0.08); top:-150px; right:-150px; }
.deco.d2 { width:400px; height:400px; background:rgba(247,147,30,0.06); bottom:-100px; left:-80px; }
.deco.d3 { width:200px; height:200px; background:rgba(247,147,30,0.1); top:300px; left:60px; }

/* レイアウト */
.slide {
  width:100%; height:100%;
  display:flex; flex-direction:row;
  align-items:center;
  padding:0;
  position:relative;
}

/* 左テキストゾーン */
.text-zone {
  flex:1;
  display:flex; flex-direction:column;
  justify-content:center;
  padding:80px 48px 60px 80px;
  position:relative;
  z-index:1;
}

/* 右イラストゾーン */
.illust-zone {
  width:480px; height:100%;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.illust-zone img {
  width:100%; height:100%;
  object-fit:cover;
  object-position:center top;
}
/* 左端をなじませるグラデーション */
.illust-zone::before {
  content:'';
  position:absolute; top:0; left:0;
  width:120px; height:100%;
  background:linear-gradient(to right, #FFF8F0, transparent);
  z-index:1;
}

/* ターゲットテキスト */
.target-text {
  font-size:22px; font-weight:700;
  color:#D4640A; letter-spacing:0.05em;
  margin-bottom:36px;
}

/* メインキャッチ */
.main-catch {
  font-size:84px; font-weight:900;
  color:#3E1F00; line-height:1.25;
  letter-spacing:0.02em;
  margin-bottom:40px;
}

/* サブコピー */
.sub-copy {
  font-size:26px; font-weight:700;
  color:#D4640A; letter-spacing:0.03em;
  padding-left:4px;
}

/* 保存促進 */
.save-text {
  position:absolute;
  bottom:56px; left:80px;
  font-size:20px; font-weight:700;
  color:rgba(62,31,0,0.4); letter-spacing:0.03em;
}

/* ロゴ */
.logo {
  position:absolute;
  bottom:48px; right:64px;
}
.logo img { height:30px; opacity:0.5; }
</style>
</head>
<body>

<div class="deco d1"></div>
<div class="deco d2"></div>
<div class="deco d3"></div>

<div class="slide">
  <div class="text-zone">
    <div class="target-text">複数事業を回してる経営者の方へ</div>

    <div class="main-catch">
      深夜1時。<br>またここに<br>いる。
    </div>

    <div class="sub-copy">moruko導入前の話です。</div>

    <div class="save-text">→ 保存して後で読む</div>
  </div>

  <div class="illust-zone">
    <img src="morukoimage/cover_illust_01.png" alt="深夜作業イメージ">
  </div>
</div>

<div class="logo">
  <img src="morukoimage/moruko_logo_wide.png" alt="moruko">
</div>

<script>
function fit(){const s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform=`scale(${s})`;}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
