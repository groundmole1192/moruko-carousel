<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  background:#222;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}
body {
  width:1080px; height:1080px;
  font-family:'Noto Sans JP',sans-serif;
  background:#FFE4C4;
  overflow:hidden; position:relative;
  transform-origin:center center; flex-shrink:0;
}

/* 背景装飾 */
.deco { position:absolute; border-radius:50%; }
.deco.d1 { width:400px; height:400px; background:rgba(247,147,30,0.1); top:-100px; right:-80px; }
.deco.d2 { width:250px; height:250px; background:rgba(247,147,30,0.08); bottom:80px; left:-60px; }

.slide {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  padding:72px 80px 60px;
  position:relative;
}

/* スライド番号 */
.slide-label {
  font-size:20px; font-weight:700;
  color:rgba(62,31,0,0.4); letter-spacing:0.05em;
  margin-bottom:44px;
}

/* 解決後シーン */
.scene {
  font-size:72px; font-weight:900;
  color:#3E1F00; line-height:1.25;
  letter-spacing:-0.01em;
  margin-bottom:44px;
}

/* 感謝セリフボックス */
.thanks-box {
  background:#F7931E;
  border-radius:20px;
  padding:30px 40px;
  display:inline-block;
  margin-bottom:36px;
  box-shadow:0 8px 28px rgba(247,147,30,0.3);
}
.thanks-text {
  font-size:36px; font-weight:900;
  color:#fff; line-height:1.4;
  letter-spacing:0.02em;
}

/* 変化の事実 */
.fact {
  font-size:22px; font-weight:700;
  color:rgba(62,31,0,0.6); line-height:1.8;
}

/* モルコ */
.moruko {
  position:absolute;
  bottom:-10px; right:40px;
  width:320px;
}
.moruko img {
  width:100%; height:auto;
  object-fit:contain;
  filter:drop-shadow(0 12px 30px rgba(0,0,0,0.1));
}

/* ロゴ */
.logo {
  position:absolute; bottom:48px; left:80px;
}
.logo img { height:26px; opacity:0.35; }
</style>
</head>
<body>

<div class="deco d1"></div>
<div class="deco d2"></div>

<div class="slide">

  <div class="slide-label">5 / 6</div>

  <div class="scene">
    朝7時。<br>コーヒーが<br>美味しい。
  </div>

  <div class="thanks-box">
    <div class="thanks-text">ありがとう...！<br>moruko...！🦦</div>
  </div>

  <div class="fact">
    メール返信・SNS下書き・<br>スケジュール調整、<br>全部終わってた。
  </div>

</div>

<div class="moruko">
  <img src="morukoimage/moruko_character.png" alt="moruko">
</div>

<div class="logo">
  <img src="morukoimage/moruko_logo_wide.png" alt="moruko">
</div>

<script>
function fit(){const s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform=`scale(${s})`;}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
