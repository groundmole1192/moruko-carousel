<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  background:#222;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}
body {
  width:1080px; height:1080px;
  font-family:'Noto Sans JP',sans-serif;
  background:#fff;
  overflow:hidden; position:relative;
  transform-origin:center center; flex-shrink:0;
}

.slide {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  padding:64px 80px;
  position:relative;
}

/* スライド番号 + 見出し */
.slide-label {
  font-size:22px; font-weight:700;
  color:#aaa; letter-spacing:0.05em;
  margin-bottom:48px;
  display:flex; align-items:center; gap:10px;
}
.slide-num {
  background:#F2F2F2; color:#999;
  font-size:16px; padding:4px 12px;
  border-radius:999px;
}

/* 状況テキスト */
.situation {
  font-size:88px; font-weight:900;
  color:#3E1F00; line-height:1.2;
  letter-spacing:-0.02em;
  margin-bottom:48px;
}
.situation em {
  color:#D4640A; font-style:normal;
}

/* 内心の声ボックス */
.inner-voice {
  background:#F2F2F2;
  border-left:5px solid #ddd;
  border-radius:0 12px 12px 0;
  padding:28px 36px;
  margin-bottom:36px;
}
.inner-voice .quote {
  font-size:28px; font-weight:700;
  color:#555; line-height:1.6;
}
.inner-voice .quote::before { content: '「'; }
.inner-voice .quote::after { content: '」'; }

/* 補足 */
.note {
  font-size:22px; font-weight:700;
  color:#bbb; letter-spacing:0.03em;
}

/* ロゴ */
.logo {
  position:absolute; bottom:48px; right:64px;
}
.logo img { height:24px; opacity:0.3; }
</style>
</head>
<body>
<div class="slide">

  <div class="slide-label">
    <span class="slide-num">2 / 6</span>
    😔 深夜の作業部屋
  </div>

  <div class="situation">
    未読メール、<br><em>83件。</em>
  </div>

  <div class="inner-voice">
    <div class="quote">また今日も<br>終わらなかった...</div>
  </div>

  <div class="note">これ、3年続いてます。</div>

</div>

<div class="logo">
  <img src="morukoimage/moruko_logo_wide.png" alt="moruko">
</div>

<script>
function fit(){const s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform=`scale(${s})`;}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
