<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html {
  background:#222;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
}
body {
  width:1080px; height:1080px;
  font-family:'Noto Sans JP',sans-serif;
  background:#FFF8F0;
  overflow:hidden; position:relative;
  transform-origin:center center; flex-shrink:0;
}

/* 背景装飾 */
.deco { position:absolute; border-radius:50%; }
.deco.d1 { width:500px; height:500px; background:rgba(247,147,30,0.07); top:-150px; right:-100px; }
.deco.d2 { width:300px; height:300px; background:rgba(247,147,30,0.05); bottom:-80px; left:-80px; }

.slide {
  width:100%; height:100%;
  display:flex; flex-direction:row;
  align-items:center;
  padding:0;
  position:relative;
}

/* 左ゾーン */
.text-zone {
  flex:1;
  display:flex; flex-direction:column;
  justify-content:center;
  padding:72px 40px 72px 80px;
  gap:36px;
  position:relative; z-index:1;
}

.headline {
  font-size:44px; font-weight:900;
  color:#3E1F00; line-height:1.3;
}
.headline em { color:#F7931E; font-style:normal; }

/* チェックリスト */
.check-list {
  display:flex; flex-direction:column;
  gap:20px;
}
.check-item {
  display:flex; align-items:flex-start;
  gap:16px;
  background:#fff;
  border-radius:14px;
  padding:20px 24px;
  box-shadow:0 2px 12px rgba(247,147,30,0.08);
}
.check-icon {
  width:32px; height:32px;
  background:#5AAD3F;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  font-size:16px; color:#fff; font-weight:900;
  margin-top:2px;
}
.check-text {
  font-size:24px; font-weight:700;
  color:#3E1F00; line-height:1.5;
}
.check-text span { color:#F7931E; font-weight:900; }

/* 右ゾーン（モルコ） */
.moruko-zone {
  width:400px; height:100%;
  flex-shrink:0;
  display:flex; align-items:flex-end;
  justify-content:center;
  padding-bottom:0;
  position:relative;
}
.moruko-zone img {
  width:360px; height:auto;
  object-fit:contain;
  filter:drop-shadow(0 16px 40px rgba(0,0,0,0.1));
  transform:translateY(10px);
}

/* ロゴ */
.logo {
  position:absolute; bottom:44px; right:48px;
}
.logo img { height:24px; opacity:0.35; }
</style>
</head>
<body>

<div class="deco d1"></div>
<div class="deco d2"></div>

<div class="slide">
  <div class="text-zone">

    <div class="headline">
      {{ headline }}
    </div>

    <div class="check-list">
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">{{ check1 }}</div>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">{{ check2 }}</div>
      </div>
      <div class="check-item">
        <div class="check-icon">✓</div>
        <div class="check-text">{{ check3 }}</div>
      </div>
    </div>

  </div>

  <div class="moruko-zone">
    <img src="morukoimage/moruko_with_miniPC.png" alt="moruko">
  </div>
</div>

<div class="logo">
  <img src="morukoimage/moruko_logo_wide.png" alt="moruko">
</div>

<script>
function fit(){const s=Math.min(window.innerWidth,window.innerHeight)/1080;document.body.style.transform=`scale(${s})`;}
fit();window.addEventListener('resize',fit);
</script>
</body>
</html>
